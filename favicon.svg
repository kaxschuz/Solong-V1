<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#FDFAF6"/>
  <!-- Long trunk -->
  <rect x="14" y="18" width="4" height="11" rx="1.5" fill="#8B5E3C"/>
  <!-- Shadow under crown -->
  <ellipse cx="16" cy="19" rx="9" ry="2.5" fill="#2D6A4F" opacity=".18"/>
  <!-- Full rounded crown -->
  <circle cx="16" cy="12" r="10" fill="#40916C"/>
  <!-- Depth / shading left -->
  <ellipse cx="12" cy="14" rx="5" ry="6" fill="#2D6A4F" opacity=".3"/>
  <!-- Highlight top-right -->
  <ellipse cx="18.5" cy="8.5" rx="5" ry="4.5" fill="#52B788" opacity=".5"/>
  <!-- Small light sparkle -->
  <circle cx="19" cy="7.5" r="1.5" fill="#B7E4C7" opacity=".55"/>
</svg>
